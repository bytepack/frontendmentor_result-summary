<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">

    <title>Results card</title>
</head>
<body>
<main class="main">
    <div class="card">
        <section class="card__result">
            <h3 class="card__title1">Your Result</h3>
            <div class="card__number-container">
                <h3 class="card__number"><span class="card__the-number">76</span><br>of 100</h3>
            </div>

            <h3 class="card__title2">Great</h3>
            <p class="card__description">You scored higher than 65% of the people who have taken these tests.</p>
        </section>

        <section class="card__summary">
            <h3 class="card__title3">Summary</h3>
            <ul class="card__items">
                <li class="card__item card__item--red">
                    <img class="card__img" src="images/icon-reaction.svg" alt="reaction">
                    <h3 class="card__title">Reaction</h3>
                    <p class="card__num"><span class="card__the-num">80</span> / 100</p>
                </li>
                <li class="card__item card__item--yellow">
                    <img class="card__img" src="images/icon-memory.svg" alt="Memory">
                    <h3 class="card__title">Memory</h3>
                    <p class="card__num"><span class="card__the-num">92</span> / 100</p>
                </li>
                <li class="card__item card__item--green">
                    <img class="card__img" src="images/icon-verbal.svg" alt="Verbal">
                    <h3 class="card__title">Verbal</h3>
                    <p class="card__num"><span class="card__the-num">61</span> / 100</p>
                </li>
                <li class="card__item card__item--blue">
                    <img class="card__img" src="images/icon-visual.svg" alt="Visual">
                    <h3 class="card__title">Visual</h3>
                    <p class="card__num"><span class="card__the-num">72</span> / 100</p>
                </li>
            </ul>
            <a class="card__continue" href="#">Continue</a>
        </section>
    </div>
</main>

</body>
</html>
